server.port=8090
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

# 允许 RAG SSE 长连接在模型生成期间保持打开。
spring.mvc.async.request-timeout=5m

spring.application.name=ai-rag-knowledge

spring.datasource.url=jdbc:postgresql://localhost:5432/ai_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.ai.chat.client.enabled=false
spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none

spring.flyway.enable=true
spring.flyway.locations=classpath:db/migration
spring.flyway.encoding=utf-8

#mybatis plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.banner=false
mybatis-plus.type-handlers-package=com.elliot.ai.rag.typerhandler




# OpenAPI 文档：启动后访问 http://localhost:8090/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# 应用启动时自动创建 pgvector 所需的扩展、表和索引；生产环境建议改用 Flyway/Liquibase 管理。
spring.ai.vectorstore.pgvector.initialize-schema=true

# 向量索引类型：HNSW 查询速度快、召回率高，适合以检索为主的 RAG 场景。
spring.ai.vectorstore.pgvector.index-type=HNSW
# 向量相似度度量：余弦距离侧重比较文本向量的语义方向，距离越小表示越相似。
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# 向量维度，必须与 Embedding 模型的输出维度一致；nomic-embed-text 输出 768 维。
spring.ai.vectorstore.pgvector.dimensions=768

#文件路径
app.storage.root-directory=./data/uploads
app.storage.parsed-directory=./data/parsed
app.rag.chunk.chunk-size=500
app.rag.chunk.read-buffer-chars=10000
app.rag.chunk.database-batch-size=100
app.rag.chunk.min-chunk-chars=50
app.rag.chunk.overlap=0
#最多获取多少个Chunk
app.rag.retrieval.top-k=5
#最低相似度
app.rag.retrieval.similarity-threshold=0.5
#Context 最大字符数
app.rag.retrieval.max-context-chars=20000
# 命中 Chunk 前后各扩展几个 Chunk
app.rag.retrieval.adjacent-chunk-radius=1
# 单个引用来源允许占用的最大字符数
app.rag.retrieval.max-source-chars=8000

# 文件上传限制：当前接口一次仅接收一个文档。
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
